# Render deployment configuration for SmartMess
# Create two services: backend (Node web service) and frontend (static site)
# After importing this repo in Render, update the secret values in the web dashboard

services:
  - type: web
    name: smartmess-backend
    env: node
    branch: main
    repo: https://github.com/ThakurAmanKumar/MMS.git
    buildCommand: cd backend && npm ci
    startCommand: cd backend && NODE_ENV=production npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: "<REPLACE_WITH_MONGO_URI>"
      - key: JWT_SECRET
        value: "<REPLACE_WITH_JWT_SECRET>"
      - key: FRONTEND_URL
        value: "<REPLACE_WITH_FRONTEND_URL>"

  - type: static
    name: smartmess-frontend
    branch: main
    repo: https://github.com/ThakurAmanKumar/MMS.git
    buildCommand: cd frontend && npm ci && npm run build
    publishPath: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "<REPLACE_WITH_BACKEND_API_URL>"

# Notes:
# - Replace placeholder values with real secrets in the Render dashboard or
#   configure Render secrets and reference them here if preferred.
# - After deploy, use Render's one-off shell to run `npm run create-admin` in
#   the backend service (if you want to seed the admin user).